<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore the mountains from base to summit. Discover the incredible flora and fauna that live at every altitude.">
  <title>The Mountain — Explore Flora & Fauna at Every Altitude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Intro Screen -->
  <div id="intro-screen">
    <div class="intro-content">
      <div class="intro-mountain-icon">
        <svg viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M60 5L110 75H10L60 5Z" fill="url(#mountain-grad)" opacity="0.8"/>
          <path d="M60 5L75 30L65 25L60 5Z" fill="white" opacity="0.6"/>
          <path d="M60 5L45 30L55 25L60 5Z" fill="white" opacity="0.4"/>
          <defs>
            <linearGradient id="mountain-grad" x1="60" y1="5" x2="60" y2="75">
              <stop offset="0%" stop-color="#E8E0F0"/>
              <stop offset="100%" stop-color="#5B7B6A"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="intro-title">The Mountain</h1>
      <p class="intro-subtitle">Scroll to descend the mountain and discover<br>the flora and fauna at every altitude</p>
      <div class="intro-arrow" id="start-btn">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        <span>Begin Descent</span>
      </div>
    </div>
    <div class="intro-particles" id="intro-particles"></div>
  </div>

  <!-- Main Scrollable Area -->
  <div id="mountain-container">
    <!-- Altitude Indicator -->
    <div id="altitude-indicator">
      <div class="altitude-bar">
        <div class="altitude-fill" id="altitude-fill"></div>
        <div class="altitude-marker" id="altitude-marker"></div>
      </div>
      <div class="altitude-label" id="altitude-label">0 m</div>
    </div>

    <!-- Zone Labels (sticky) -->
    <div id="zone-label-container">
      <div class="zone-label" id="zone-label">Foothills</div>
    </div>

    <!-- Scroll Content -->
    <div id="scroll-content">
      <!-- Creatures will be dynamically injected here -->
    </div>

    <!-- Background layers for parallax -->
    <div id="bg-layer" class="bg-layer"></div>
  </div>

  <!-- Creature Detail Modal -->
  <div id="creature-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">&times;</button>
      <div class="modal-icon" id="modal-icon"></div>
      <h2 class="modal-name" id="modal-name"></h2>
      <div class="modal-altitude" id="modal-altitude"></div>
      <p class="modal-scientific" id="modal-scientific"></p>
      <p class="modal-description" id="modal-description"></p>
      <div class="modal-facts" id="modal-facts"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
